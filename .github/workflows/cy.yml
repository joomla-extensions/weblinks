name: CI Weblinks

on:
  push:
    branches: [ main, 5.x-dev ]
  pull_request:
    branches: [ main, 5.x-dev ]
  schedule: # nightly run
    - cron: "0 2 * * *" # every day at 02:00 UTC

jobs:
  composer:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [8.2, 8.3, 8.4]
    container:
      image: joomlaprojects/docker-images:php${{ matrix.php-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress --no-interaction

  phpcs:
    runs-on: ubuntu-latest
    needs: composer
    container:
      image: joomlaprojects/docker-images:php8.3
    steps:
      - uses: actions/checkout@v4
      - name: Run PHP CS Fixer & PHPCS
        run: |
          composer install
          ./vendor/bin/php-cs-fixer fix -vvv --dry-run --diff
          ./vendor/bin/phpcs --extensions=php -p --standard=ruleset.xml src/

  phpstan:
    runs-on: ubuntu-latest
    needs: composer
    container:
      image: joomlaprojects/docker-images:php8.3
    steps:
      - uses: actions/checkout@v4
      - name: Run PHPStan
        run: |
          composer install
          ./vendor/bin/phpstan analyse src --level=5 --no-progress --no-interaction

  prepare-tests:
    runs-on: ubuntu-latest
    needs: [composer, phpcs]
    strategy:
      matrix:
        joomla-version: ['5.4', '6.0', '6.1']
    steps:
      - uses: actions/checkout@v4
      - name: Download Joomla ${{ matrix.joomla-version }}
        run: |
          URL=$(curl -s "https://api.github.com/repos/joomla/joomla-cms/releases" | \
                grep -oP '"browser_download_url":\s*"[^"]*'"${{ matrix.joomla-version }}"'[^"]*Full_Package\.zip"' | \
                sed 's/"browser_download_url":\s*"//;s/"$//' | head -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not find URL for version ${{ matrix.joomla-version }}"
            exit 1
          fi
          curl -LfsS "$URL" -o joomla.zip
          unzip -q joomla.zip -d joomla

      - name: Upload Joomla artifacts
        uses: actions/upload-artifact@v4
        with:
          name: joomla-${{ matrix.joomla-version }}
          path: joomla/

  system-tests:
    runs-on: ubuntu-latest
    needs: prepare-tests
    strategy:
      fail-fast: false
      matrix:
        joomla-version: ['5.4', '6.0', '6.1']
        php-version: ['8.2', '8.3', '8.4']
        db: [mysql, mariadb, pgsql]
        include:
          - db: mysql
            image: mysql:8.0
          - db: mariadb
            image: mariadb:10.6
          - db: pgsql
            image: postgres:14-alpine

    services:
      mysql:
        image: ${{ matrix.db == 'mysql' && matrix.image || 'mysql:8.0' }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: joomla_ut
          MYSQL_PASSWORD: joomla_ut
          MYSQL_DATABASE: test_joomla
      mariadb:
        image: ${{ matrix.db == 'mariadb' && matrix.image || 'mariadb:10.6' }}
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_USER: joomla_ut
          MARIADB_PASSWORD: joomla_ut
          MARIADB_DATABASE: test_joomla
      postgres:
        image: ${{ matrix.db == 'pgsql' && matrix.image || 'postgres:14-alpine' }}
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: test_joomla

    container:
      image: cypress/base:18.16.0 # Node + Cypress preinstalled

    steps:
      - uses: actions/checkout@v4
      - name: Download Joomla artifacts
        uses: actions/download-artifact@v4
        with:
          name: joomla-${{ matrix.joomla-version }}
      - name: Install PHP dependencies
        run: composer install
      - name: Install Node dependencies
        run: npm ci
      - name: Run Cypress E2E
        run: |
          npx cypress verify
          npx cypress run --browser=chrome --e2e --config video=false
