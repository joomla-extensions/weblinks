name: CI Weblinks

on:
  push:
    branches: [ main, 5.x-dev ]
  pull_request:
    branches: [ main, 5.x-dev ]

jobs:
  composer:
    runs-on: ubuntu-latest
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies

  phpcs:
    runs-on: ubuntu-latest
    needs: composer
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
      - name: Run PHP CS Fixer and PHPCS
        run: |
          ./vendor/bin/php-cs-fixer fix -vvv --dry-run --diff
          ./vendor/bin/phpcs --extensions=php -p --standard=ruleset.xml src/

  npm:
    runs-on: ubuntu-latest
    needs: phpcs
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'

  prepare_tests:
    runs-on: ubuntu-latest
    needs: npm
    strategy:
      matrix:
        joomla-version: ['5', '6', '6.1']
    container:
      image: joomlaprojects/docker-images:cypress8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      - uses: ./.github/actions/setup-cypress

      - name: Determine Nightly URL for Joomla ${{ matrix.joomla-version }}
        id: joomla-info
        run: |
          if [ "${{ matrix.joomla-version }}" == "5" ]; then BRANCH="5.4-dev"; fi
          if [ "${{ matrix.joomla-version }}" == "6" ]; then BRANCH="6.0-dev"; fi
          if [ "${{ matrix.joomla-version }}" == "6.1" ]; then BRANCH="6.1-dev"; fi
          
          HTML_CONTENT=$(curl -sL https://developer.joomla.org/nightly-builds.html)
          URL=$(echo "$HTML_CONTENT" | grep -oP "https://github.com/joomla-projects/joomla-native-builds/releases/download/[^\"]+Joomla_${BRANCH}[^\"]+Full_Package.zip" | head -n 1)
          
          if [ -z "$URL" ]; then
            echo "ERROR: Could not find nightly URL for $BRANCH"
            exit 1
          fi
          
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "url_hash=$(echo -n $URL | md5sum | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Cache Joomla Zip
        id: cache-joomla
        uses: actions/cache@v4
        with:
          path: joomla.zip
          key: joomla-nightly-${{ matrix.joomla-version }}-${{ steps.joomla-info.outputs.url_hash }}

      - name: Download Joomla ${{ matrix.joomla-version }}
        if: steps.cache-joomla.outputs.cache-hit != 'true'
        run: |
          curl -LfsS "${{ steps.joomla-info.outputs.url }}" -o joomla.zip

      - name: Build and Verify
        run: |
          vendor/bin/robo build
          unzip -t joomla.zip > /dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
          path: |
            dist/
            joomla.zip
          retention-days: 1

  system-tests:
    runs-on: ubuntu-latest
    needs: prepare_tests
    strategy:
      fail-fast: false
      matrix:
        joomla-version: ['5', '6', '6.1']
        php-version: ['8.2', '8.3', '8.4']
        db: [mysql, mariadb, pgsql]
        include:
          - db: mysql
            db-type: mysqli
            db-host: mysql
            image: mysql:8.0
            db-prefix: mysql_
            alter-user-cmd: |
              apt-get update && apt-get install -y default-mysql-client
              mysql -h mysql -u root -proot -e "ALTER USER 'joomla_ut'@'%' IDENTIFIED WITH mysql_native_password BY 'joomla_ut'; FLUSH PRIVILEGES;"
          - db: mariadb
            db-type: mysqli
            db-host: mariadb
            db-prefix: mariadb_
            image: mariadb:10.4 
            alter-user-cmd: "apt-get update && apt-get install -y mariadb-client"
          - db: pgsql
            db-type: pgsql
            db-host: postgres
            db-prefix: pgsql_
            image: postgres:12-alpine
            alter-user-cmd: ""
          - joomla-version: '6'
            db: mariadb
            image: mariadb:10.6
          - joomla-version: '6.1'
            db: mariadb
            image: mariadb:10.6
        exclude:
          - joomla-version: '5'
            php-version: '8.4'

    container:
      image: joomlaprojects/docker-images:cypress${{ matrix.php-version }}
    
    services:
      mysql:
        image: mysql:8.0
        env: { MYSQL_ROOT_PASSWORD: root, MYSQL_USER: joomla_ut, MYSQL_PASSWORD: joomla_ut, MYSQL_DATABASE: test_joomla }
        options: --health-cmd="mysqladmin ping -h localhost -u root -proot" --health-interval=10s --health-timeout=5s --health-retries=3
      mariadb:
        image: ${{ matrix.image }}
        env: { MARIADB_ROOT_PASSWORD: root, MARIADB_USER: joomla_ut, MARIADB_PASSWORD: joomla_ut, MARIADB_DATABASE: test_joomla }
        options: --health-cmd="mariadb-admin ping -h localhost -uroot -proot" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres:12-alpine
        env: { POSTGRES_USER: root, POSTGRES_PASSWORD: joomla_ut, POSTGRES_DB: test_joomla }
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      
      # Added PHPStan check
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src --level=5 --no-progress

      - uses: ./.github/actions/setup-cypress

      - name: Setup and run ${{ matrix.db }} (J${{ matrix.joomla-version }} / PHP ${{ matrix.php-version }})
        run: |
          ${{ matrix.alter-user-cmd }}
          mkdir -p /tests/www/${{ matrix.db }}/
          unzip joomla.zip -d /tests/www/${{ matrix.db }}/
          cp dist/pkg-weblinks-current.zip /tests/www/${{ matrix.db }}/
          cd /tests/www/${{ matrix.db }}/
          apache2ctl -D FOREGROUND &
          chmod +rwx /root
          php installation/joomla.php install --verbose --site-name="Joomla CMS test" --admin-email=admin@example.org --admin-username=ci-admin --admin-user="jane doe" --admin-password=joomla-17082005 --db-type=${{ matrix.db-type }} --db-host=${{ matrix.db-host }} --db-name=test_joomla --db-pass=joomla_ut --db-user=${{ matrix.db == 'pgsql' && 'root' || 'joomla_ut' }} --db-encryption=0 --db-prefix=${{ matrix.db-prefix }}
          php cli/joomla.php config:set debug=true error_reporting=maximum
          php cli/joomla.php extension:install --path=/tests/www/${{ matrix.db }}/pkg-weblinks-current.zip
          chmod -R 777 /tests/www/${{ matrix.db }}/
          chown -R www-data /tests/www/${{ matrix.db }}/
          cd $GITHUB_WORKSPACE
          npx cypress run --browser=chrome --e2e --config video=false --env cmsPath=/tests/www/${{ matrix.db }},db_type=${{ matrix.db-type }},db_host=${{ matrix.db-host }},db_name=test_joomla,db_user=${{ matrix.db == 'pgsql' && 'root' || 'joomla_ut' }},db_password=joomla_ut,db_prefix=${{ matrix.db-prefix }},logFile=/var/log/apache2/error.log --config baseUrl=http://localhost/${{ matrix.db }}

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-j${{ matrix.joomla-version }}-${{ matrix.db }}-php${{ matrix.php-version }}
          path: tests/cypress/output/screenshot
          retention-days: 7
