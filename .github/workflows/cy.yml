name: CI Weblinks (Stable)

on:
  push:
    branches: [ main, 5.x-dev ]
  pull_request:
    branches: [ main, 5.x-dev ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  EXTENSION_ZIP: pkg-weblinks-current.zip

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: joomlaprojects/docker-images:php8.3
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      - run: vendor/bin/robo build
      - uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: dist/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: joomlaprojects/docker-images:php8.3
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
      - run: |
          ./vendor/bin/php-cs-fixer fix --dry-run --diff
          ./vendor/bin/phpcs --standard=ruleset.xml src/

  static:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    container:
      image: joomlaprojects/docker-images:php${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-build
      - uses: ./.github/actions/setup-dependencies
      - run: ./vendor/bin/phpstan analyse src --level=5

  system-tests:
    runs-on: ubuntu-latest
    needs: [build, lint, static]
    strategy:
      fail-fast: false
      matrix:
        include:
          - joomla: "5.4"
            php: "8.2"
            db: mysql
            db_image: mysql:8.0
            db_type: mysqli
          - joomla: "6.0"
            php: "8.3"
            db: mariadb
            db_image: mariadb:10.6
            db_type: mysqli
          - joomla: "6.1"
            php: "8.4"
            db: pgsql
            db_image: postgres:15-alpine
            db_type: pgsql

    container:
      image: joomlaprojects/docker-images:cypress${{ matrix.php }}

    services:
      db:
        image: ${{ matrix.db_image }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_joomla
          MYSQL_USER: joomla_ut
          MYSQL_PASSWORD: joomla_ut
          MARIADB_ROOT_PASSWORD: root
          POSTGRES_USER: joomla_ut
          POSTGRES_PASSWORD: joomla_ut
          POSTGRES_DB: test_joomla

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-build
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      - uses: ./.github/actions/setup-cypress

      - run: |
          curl -fL https://downloads.joomla.org/cms/joomla${{ matrix.joomla }}/latest/Joomla_${{ matrix.joomla }}-Stable-Full_Package.zip -o joomla.zip
          unzip -q joomla.zip -d /tests/www/site

      - uses: ./.github/actions/setup-db
        with:
          db: ${{ matrix.db }}
          host: db
          name: test_joomla
          user: joomla_ut
          password: joomla_ut

      - run: |
          apache2ctl start
          php /tests/www/site/installation/joomla.php install \
            --site-name="CI Stable" \
            --admin-user=admin \
            --admin-username=admin \
            --admin-password=admin123 \
            --admin-email=admin@example.org \
            --db-type=${{ matrix.db_type }} \
            --db-host=db \
            --db-user=joomla_ut \
            --db-pass=joomla_ut \
            --db-name=test_joomla \
            --db-prefix=ci_

          php /tests/www/site/cli/joomla.php extension:install \
            --path=dist/${{ env.EXTENSION_ZIP }}

      - run: |
          npx cypress run \
            --browser chrome \
            --config baseUrl=http://localhost \
            --env cmsPath=/tests/www/site

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-stable-${{ matrix.joomla }}-${{ matrix.db }}
          path: tests/cypress/output/screenshot
