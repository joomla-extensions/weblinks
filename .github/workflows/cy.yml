name: CI Weblinks

on:
  push:
    branches: [ main, 5.x-dev ]
  pull_request:
    branches: [ main, 5.x-dev ]

jobs:
  composer:
    runs-on: ubuntu-latest
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies

  phpcs:
    runs-on: ubuntu-latest
    needs: composer
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
      - name: Run PHP CS Fixer and PHPCS
        run: |
          ./vendor/bin/php-cs-fixer fix -vvv --dry-run --diff
          ./vendor/bin/phpcs --extensions=php -p --standard=ruleset.xml src/

  npm:
    runs-on: ubuntu-latest
    needs: phpcs
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'

  prepare_tests:
    runs-on: ubuntu-latest
    needs: npm
    strategy:
      matrix:
        joomla-version: [5, 6]
    container:
      image: joomlaprojects/docker-images:cypress8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      - uses: ./.github/actions/setup-cypress
      - name: Fetch and Download Joomla ${{ matrix.joomla-version }}
        run: |
          vendor/bin/robo build
          if [ "${{ matrix.joomla-version }}" == "6" ]; then
            # Always get the absolute latest stable (now J6)
            curl -L https://joomla.org/latest -o joomla.zip
          else
            # Scrape the downloads page to find the latest 5.x Full Package zip link
            # This extracts the first link containing 'Joomla_5' and 'Full_Package.zip'
            J5_URL=$(curl -s https://downloads.joomla.org/cms/joomla5 | grep -oP 'https://downloads.joomla.org/cms/joomla5/[^"]+Joomla_5[^"]+Full_Package.zip' | head -n 1)
            echo "Found Joomla 5 URL: $J5_URL"
            curl -L "$J5_URL" -o joomla.zip
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
          path: |
            dist/
            joomla.zip

  system-tests:
    runs-on: ubuntu-latest
    needs: prepare_tests
    strategy:
      fail-fast: false
      matrix:
        joomla-version: [5, 6]
        php-version: ['8.1', '8.2', '8.3', '8.4']
        db: [mysql, mariadb, pgsql]
        include:
          - db: mysql
            db-type: mysqli
            db-host: mysql
            image: mysql:8.0
            db-prefix: mysql_
            alter-user-cmd: |
              apt-get update && apt-get install -y default-mysql-client
              mysql -h mysql -u root -proot -e "ALTER USER 'joomla_ut'@'%' IDENTIFIED WITH mysql_native_password BY 'joomla_ut'; FLUSH PRIVILEGES;"
          
          - db: mariadb
            db-type: mysqli
            db-host: mariadb
            db-prefix: mariadb_
            image: mariadb:10.4 # Default for J5
            alter-user-cmd: "apt-get update && apt-get install -y mariadb-client"

          - db: pgsql
            db-type: pgsql
            db-host: postgres
            db-prefix: pgsql_
            image: postgres:12-alpine
            alter-user-cmd: ""

          # Joomla 6 Overrides
          - joomla-version: 6
            db: mariadb
            image: mariadb:10.6

        exclude:
          - joomla-version: 5
            php-version: '8.4'
          - joomla-version: 6
            php-version: '8.1'
          - joomla-version: 6
            php-version: '8.2'

    container:
      image: joomlaprojects/docker-images:cypress${{ matrix.php-version }}
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: joomla_ut
          MYSQL_PASSWORD: joomla_ut
          MYSQL_DATABASE: test_joomla
        options: --health-cmd="mysqladmin ping -h localhost -u root -proot" --health-interval=10s --health-timeout=5s --health-retries=3
      mariadb:
        image: ${{ matrix.image }}
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_USER: joomla_ut
          MARIADB_PASSWORD: joomla_ut
          MARIADB_DATABASE: test_joomla
        options: --health-cmd="mariadb-admin ping -h localhost -uroot -proot" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres:12-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: joomla_ut
          POSTGRES_DB: test_joomla
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      - uses: ./.github/actions/setup-cypress
      - name: Setup and run ${{ matrix.db }} (J${{ matrix.joomla-version }} / PHP ${{ matrix.php-version }})
        run: |
          ${{ matrix.alter-user-cmd }}
          mkdir -p /tests/www/${{ matrix.db }}/
          unzip joomla.zip -d /tests/www/${{ matrix.db }}/
          cp dist/pkg-weblinks-current.zip /tests/www/${{ matrix.db }}/
          cd /tests/www/${{ matrix.db }}/
          apache2ctl -D FOREGROUND &
          chmod +rwx /root
          php installation/joomla.php install --verbose --site-name="Joomla CMS test" --admin-email=admin@example.org --admin-username=ci-admin --admin-user="jane doe" --admin-password=joomla-17082005 --db-type=${{ matrix.db-type }} --db-host=${{ matrix.db-host }} --db-name=test_joomla --db-pass=joomla_ut --db-user=${{ matrix.db == 'pgsql' && 'root' || 'joomla_ut' }} --db-encryption=0 --db-prefix=${{ matrix.db-prefix }}
          php cli/joomla.php config:set debug=true error_reporting=maximum
          php cli/joomla.php extension:install --path=/tests/www/${{ matrix.db }}/pkg-weblinks-current.zip
          chmod -R 777 /tests/www/${{ matrix.db }}/
          chown -R www-data /tests/www/${{ matrix.db }}/
          cd $GITHUB_WORKSPACE
          npx cypress run --browser=chrome --e2e --env cmsPath=/tests/www/${{ matrix.db }},db_type=${{ matrix.db-type }},db_host=${{ matrix.db-host }},db_name=test_joomla,db_user=${{ matrix.db == 'pgsql' && 'root' || 'joomla_ut' }},db_password=joomla_ut,db_prefix=${{ matrix.db-prefix }},logFile=/var/log/apache2/error.log --config baseUrl=http://localhost/${{ matrix.db }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-j${{ matrix.joomla-version }}-${{ matrix.db }}-php${{ matrix.php-version }}
          path: tests/cypress/output/screenshot
