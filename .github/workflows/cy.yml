name: CI Weblinks

on:
  push:
    branches: [ main, 5.x-dev ]
  pull_request:
    branches: [ main, 5.x-dev ]

jobs:
  composer:
    runs-on: ubuntu-latest
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies

  phpcs:
    runs-on: ubuntu-latest
    needs: composer
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
      - name: Run PHP CS Fixer and PHPCS
        run: |
          ./vendor/bin/php-cs-fixer fix -vvv --dry-run --diff
          ./vendor/bin/phpcs --extensions=php -p --standard=ruleset.xml src/

  npm:
    runs-on: ubuntu-latest
    needs: phpcs
    container:
      image: joomlaprojects/docker-images:php8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'

  prepare_tests:
    runs-on: ubuntu-latest
    needs: npm
    strategy:
      matrix:
        joomla-version: ['5.4', '6.0', '6.1']
    container:
      image: joomlaprojects/docker-images:cypress8.2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'
      - uses: ./.github/actions/setup-cypress

      - name: Determine Nightly URL for Joomla ${{ matrix.joomla-version }}
        id: joomla-info
        run: |
          URL=$(curl -s "https://api.github.com/repos/joomla/joomla-cms/releases" | \
                grep -oP '"browser_download_url":\s*"[^"]*'"${{ matrix.joomla-version }}"'[^"]*Full_Package\.zip"' | \
                sed 's/"browser_download_url":\s*"//;s/"$//' | \
                head -1)
          
          if [ -z "$URL" ]; then
            echo "::error::Could not find URL for version ${{ matrix.joomla-version }} in joomla/joomla-cms releases."
            exit 1
          fi
          
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "url_hash=$(echo -n "$URL" | md5sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache Joomla Zip
        id: cache-joomla
        uses: actions/cache@v4
        with:
          path: joomla.zip
          key: joomla-core-${{ matrix.joomla-version }}-${{ steps.joomla-info.outputs.url_hash }}

      - name: Download Joomla ${{ matrix.joomla-version }}
        if: steps.cache-joomla.outputs.cache-hit != 'true'
        run: |
          curl -LfsS "${{ steps.joomla-info.outputs.url }}" -o joomla.zip

      - name: Build and Verify
        run: |
          vendor/bin/robo build
          if ! unzip -t joomla.zip > /dev/null; then
            echo "ERROR: joomla.zip is invalid."
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
          path: |
            dist/
            joomla.zip
          retention-days: 1

  system-tests:
    runs-on: ubuntu-latest
    needs: prepare_tests
    strategy:
      fail-fast: false
      matrix:
        joomla-version: ['5.4', '6.0', '6.1']
        php-version: ['8.2', '8.3', '8.4']
        db: [mysql, mariadb, pgsql]
        include:
          - db: mysql
            db-type: mysqli
            db-host: mysql
            image: mysql:8.0
            db-prefix: mysql_
            alter-user-cmd: |
              apt-get update && apt-get install -y default-mysql-client
              mysql -h mysql -u root -proot -e "ALTER USER 'joomla_ut'@'%' IDENTIFIED WITH mysql_native_password BY 'joomla_ut'; FLUSH PRIVILEGES;"
          - db: mariadb
            db-type: mysqli
            db-host: mariadb
            db-prefix: mariadb_
            image: mariadb:10.4 
            alter-user-cmd: "apt-get update && apt-get install -y mariadb-client"
          - db: pgsql
            db-type: pgsql
            db-host: postgres
            db-prefix: pgsql_
            image: postgres:12-alpine
            alter-user-cmd: ""
          - joomla-version: '6.0'
            db: mariadb
            image: mariadb:10.6
          - joomla-version: '6.1'
            db: mariadb
            image: mariadb:10.6
        exclude:
          - joomla-version: '5.4'
            php-version: '8.4'
          - joomla-version: '6.0'
            php-version: '8.2'
          - joomla-version: '6.1'
            php-version: '8.2'

    container:
      image: joomlaprojects/docker-images:cypress${{ matrix.php-version }}
    
    services:
      mysql:
        image: mysql:8.0
        env: { MYSQL_ROOT_PASSWORD: root, MYSQL_USER: joomla_ut, MYSQL_PASSWORD: joomla_ut, MYSQL_DATABASE: test_joomla }
      mariadb:
        image: ${{ matrix.image }}
        env: { MARIADB_ROOT_PASSWORD: root, MARIADB_USER: joomla_ut, MARIADB_PASSWORD: joomla_ut, MARIADB_DATABASE: test_joomla }
      postgres:
        image: postgres:12-alpine
        env: { POSTGRES_USER: root, POSTGRES_PASSWORD: joomla_ut, POSTGRES_DB: test_joomla }

    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-j${{ matrix.joomla-version }}
      - uses: ./.github/actions/setup-dependencies
        with:
          npm-cache: 'true'

      - name: Run PHPStan (Ignore Errors)
        run: vendor/bin/phpstan analyse src --level=5 --no-progress --no-interaction || true

      - uses: ./.github/actions/setup-cypress

      - name: Deploy Joomla and Set Full Permissions
        run: |
          # 1. Create base directory and extract
          mkdir -p /tests/www/${{ matrix.db }}/
          unzip joomla.zip -d /tests/www/${{ matrix.db }}/
          
          # 2. Create the specific subdirectories you requested
          mkdir -p /tests/www/${{ matrix.db }}/administrator/logs/
          mkdir -p /tests/www/${{ matrix.db }}/tmp/api_rate_limit/
          
          # 3. FIX: Grant ownership to www-data and full write access to the entire tree
          # This allows Joomla to create configuration.php and write to logs/tmp
          chown -R www-data:www-data /tests/www/${{ matrix.db }}/
          chmod -R 775 /tests/www/${{ matrix.db }}/
          
          # 4. Copy the extension package for installation later
          cp dist/pkg-weblinks-current.zip /tests/www/${{ matrix.db }}/

      - name: Install Joomla and Run Tests
        run: |
          ${{ matrix.alter-user-cmd }}
          cd /tests/www/${{ matrix.db }}/
          
          # Start Apache
          apache2ctl -D FOREGROUND &
          
          # Run CLI Installation
          php installation/joomla.php install --verbose --site-name="Joomla test" --admin-email=admin@example.org --admin-username=ci-admin --admin-user="jane doe" --admin-password=joomla-17082005 --db-type=${{ matrix.db-type }} --db-host=${{ matrix.db-host }} --db-name=test_joomla --db-pass=joomla_ut --db-user=${{ matrix.db == 'pgsql' && 'root' || 'joomla_ut' }} --db-encryption=0 --db-prefix=${{ matrix.db-prefix }}
          
          # Install the extension
          php cli/joomla.php extension:install --path=/tests/www/${{ matrix.db }}/pkg-weblinks-current.zip
          
          # Execute Cypress
          cd $GITHUB_WORKSPACE
          npx cypress run --browser=chrome --e2e --config video=false --env cmsPath=/tests/www/${{ matrix.db }},db_type=${{ matrix.db-type }},db_host=${{ matrix.db-host }},db_name=test_joomla,db_user=${{ matrix.db == 'pgsql' && 'root' || 'joomla_ut' }},db_password=joomla_ut,db_prefix=${{ matrix.db-prefix }},logFile=/var/log/apache2/error.log --config baseUrl=http://localhost/${{ matrix.db }}

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-j${{ matrix.joomla-version }}-${{ matrix.db }}
          path: tests/cypress/output/screenshot
          retention-days: 7
