JLIB_RULES_SETTING_NOTES="تغییرات فقط به این کمپوننت اعمال می‌شود.<br><em><strong>ارث‌برده شده</strong></em> - یک تنظیم پیکربندی سراسری یا تنظیم از سطح بالاتر ارث‌بری و اعمال می‌شود.<br><em><strong>رد شده</strong></em> همیشه برنده است - هر چیزی که در سطح سراسری یا بالاتر تنظیم شده باشد خنثی و روی همه عناصر زیرمجموعه اعمال می‌شود.<br><em><strong>مجاز</strong></em> عمل را برای این کمپوننت فعال می‌کند، مگر اینکه توسط یک تنظیم پیکربندی سراسری لغو شود."

